info:
  name: Create Service
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseURL}}/service"
  body:
    type: json
    data: |-
      {
        "name": "Serviço 1",
        "description": "Descrição bem elaborada",
        "durationInMinutes": 60,
        "priceCents": 5000
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
